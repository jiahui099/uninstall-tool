name: Build EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole --name "一键卸载工具" uninstall_tool.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: uninstall-tool-exe
          path: dist/一键卸载工具.exe
          retention-days: 30